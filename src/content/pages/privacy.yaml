title: Privacy Policy - RwandaVisa.com
body: |
  Last updated: July 2026

  ### Information We Collect
  When you use our services, we may collect personal information including name, email address, phone number, passport details, travel preferences, and payment information.

  ### How We Use Your Information
  We use your information to process visa applications, book tours, provide customer support, improve our services, and send travel updates. We never sell your personal data to third parties.

  ### Data Security
  We implement industry-standard security measures to protect your information. Our systems are encrypted and access is restricted to authorized personnel only.

  ### Contact Us
  For privacy-related inquiries, contact us at byja1101@gmail.com.
